<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <base href="/app/" />
  <title>StallWetter — Weide-Empfehlung</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="/favicon.ico" />
</head>
<body data-page="grazing">
  <header class="app-header">
    <div class="app-header-row">
      <div class="app-header-text">
        <h1><img class="app-logo" src="/logo.png" alt="" />StallWetter</h1>
        <p class="tagline" data-i18n="app.tagline">Decke &amp; Weide für dein Pferd</p>
      </div>
      <div class="lang-switcher" role="group" data-i18n-aria-label="lang.aria">
        <button type="button" class="lang-btn" data-lang-btn="de" aria-pressed="true">DE</button>
        <button type="button" class="lang-btn" data-lang-btn="en" aria-pressed="false">EN</button>
      </div>
    </div>
  </header>

  <main class="container detail">
    <a href="index.html" class="back-link" data-i18n="detail.back">← Zurück</a>

    <h2 class="heading detail-heading" data-i18n="detail.grazing.heading">Weide-Empfehlung</h2>
    <p class="subheading detail-horse-name" id="detail-horse-name"></p>

    <div id="loading" class="loading" data-i18n="detail.loading" hidden>Wetterdaten werden geladen…</div>
    <div id="error-state" class="error" hidden></div>
    <div id="not-found" class="error" data-i18n="detail.notFound" hidden>Pferd nicht gefunden.</div>

    <section id="content" hidden>
      <div class="badge badge-grazing-safe detail-headline" id="headline">
        <span class="label" data-field="headline-label">Weide</span>
        <span class="value" data-field="headline-value">—</span>
        <span class="reason" data-field="headline-reason"></span>
      </div>

      <section class="card detail-card window-card">
        <h3 class="detail-card-title" data-i18n="detail.window.heading">Beste Zeit zum Grasen</h3>
        <p class="window-value" id="window-value">—</p>
      </section>

      <section class="card detail-card">
        <h3 class="detail-card-title" data-i18n="detail.risk.heading">Stündliches Risiko (heute)</h3>
        <div class="risk-bar" id="risk-bar"></div>
        <div class="risk-axis" id="risk-axis"></div>
        <div class="risk-legend">
          <span class="risk-legend-item"><span class="risk-swatch swatch-safe"></span><span data-i18n="detail.risk.legend.safe">OK</span></span>
          <span class="risk-legend-item"><span class="risk-swatch swatch-caution"></span><span data-i18n="detail.risk.legend.caution">Vorsicht</span></span>
          <span class="risk-legend-item"><span class="risk-swatch swatch-risky"></span><span data-i18n="detail.risk.legend.risky">Risiko</span></span>
        </div>
        <p class="hint risk-empty" id="risk-empty" data-i18n="detail.risk.noData" hidden>Stündliche Daten nicht verfügbar.</p>
      </section>

      <section class="card detail-card">
        <h3 class="detail-card-title" data-i18n="detail.trend.heading">3-Tage-Trend</h3>
        <div class="trend-row" id="trend-row"></div>
      </section>

      <section class="card detail-card detail-action-card">
        <h3 class="detail-card-title" data-i18n="detail.area.heading">Wo gegrast?</h3>
        <div class="area-row" role="radiogroup" id="area-row">
          <label class="area-btn area-btn--active" data-area="pasture">
            <input type="radio" name="area" value="pasture" checked />
            <span data-i18n="detail.area.pasture">Normale Weide</span>
          </label>
          <label class="area-btn" data-area="track">
            <input type="radio" name="area" value="track" />
            <span data-i18n="detail.area.track">Track / Paddock-Pfad</span>
          </label>
          <label class="area-btn" data-area="dryLot">
            <input type="radio" name="area" value="dryLot" />
            <span data-i18n="detail.area.dryLot">Paddock (kein Gras)</span>
          </label>
        </div>
        <button type="button" class="btn-primary btn-block" id="action-btn" style="margin-top: 14px;" data-i18n="detail.action.grazing">
          Aufs Gras gestellt
        </button>
        <p class="action-elapsed" id="action-elapsed" hidden></p>
      </section>

      <details class="why-box">
        <summary data-i18n="detail.why.heading">Warum diese Empfehlung?</summary>
        <ul class="why-list" id="why-list"></ul>
      </details>
    </section>
  </main>

  <script src="lib/i18n.js"></script>
  <script src="lib/storage.js"></script>
  <script src="lib/weather.js"></script>
  <script src="lib/decision.js"></script>
  <script src="app.js"></script>
</body>
</html>
