<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <base href="/app/" />
  <title>StallWetter — Heute</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="/favicon.ico" />
</head>
<body data-page="today">
  <header class="app-header">
    <div class="app-header-row">
      <div class="app-header-text">
        <h1><img class="app-logo" src="/logo.png" alt="" />StallWetter</h1>
        <p class="tagline" data-i18n="app.tagline">Decke &amp; Weide für dein Pferd</p>
      </div>
      <div class="lang-switcher" role="group" data-i18n-aria-label="lang.aria">
        <button type="button" class="lang-btn" data-lang-btn="de" aria-pressed="true">DE</button>
        <button type="button" class="lang-btn" data-lang-btn="en" aria-pressed="false">EN</button>
      </div>
    </div>
  </header>

  <nav class="app-nav" data-i18n-aria-label="nav.aria">
    <a href="index.html" class="active" data-i18n="nav.today">Heute</a>
    <a href="horses.html" data-i18n="nav.horses">Pferde verwalten</a>
    <a href="horses-new.html" data-i18n="nav.add">Pferd hinzufügen</a>
  </nav>

  <main class="container">
    <p class="eyebrow" id="today-date"></p>
    <h2 class="heading-lg" data-i18n="today.heading">Heute</h2>

    <div id="loading" class="loading" data-i18n="today.loading" hidden>Wetterdaten werden geladen…</div>

    <div id="error-state" class="error" hidden></div>

    <section id="recommendations-list" data-i18n-aria-label="today.list.aria">
      <template id="horse-recommendation-template">
        <article class="card horse-card">
          <div class="row-between">
            <div>
              <h2 class="horse-name"></h2>
              <p class="meta horse-location"></p>
            </div>
          </div>

          <a class="badge badge-blanket-no badge-link" data-role="blanket-badge" href="#">
            <span class="label" data-field="blanket-label">Decke</span>
            <span class="value" data-field="blanket-value">—</span>
            <span class="reason" data-field="blanket-reason"></span>
          </a>

          <a class="badge badge-grazing-safe badge-link" data-role="grazing-badge" href="#">
            <span class="label" data-field="grazing-label">Weide</span>
            <span class="value" data-field="grazing-value">—</span>
            <span class="reason" data-field="grazing-reason"></span>
            <div class="badge-foot">
              <span class="badge-meta">
                <strong data-field="grazing-window-label">Beste Zeit</strong>
                <span data-field="grazing-window-value">—</span>
              </span>
              <span class="badge-meta" data-field="grazing-trend-row" hidden>
                <strong data-field="grazing-trend-label">3-Tage-Trend</strong>
                <span data-field="grazing-trend-value"></span>
              </span>
            </div>
          </a>
        </article>
      </template>
    </section>

    <section id="empty-state" class="empty" hidden>
      <h3 data-i18n="today.empty.title">Noch keine Pferde angelegt</h3>
      <p data-i18n="today.empty.body">Lege dein erstes Pferd an, um tägliche Decken- und Weide-Empfehlungen zu erhalten.</p>
      <a href="horses-new.html" class="btn-primary" data-i18n="today.empty.cta">Pferd hinzufügen</a>
    </section>
  </main>

  <script src="lib/i18n.js"></script>
  <script src="lib/storage.js"></script>
  <script src="lib/weather.js"></script>
  <script src="lib/decision.js"></script>
  <script src="app.js"></script>
</body>
</html>
