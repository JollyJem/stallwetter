<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <base href="/app/" />
  <title>StallWetter — Pferde verwalten</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="horses">
  <header class="app-header">
    <div class="app-header-row">
      <div class="app-header-text">
        <h1>StallWetter</h1>
        <p class="tagline" data-i18n="app.tagline">Decke &amp; Weide für dein Pferd</p>
      </div>
      <div class="lang-switcher" role="group" data-i18n-aria-label="lang.aria">
        <button type="button" class="lang-btn" data-lang-btn="de" aria-pressed="true">DE</button>
        <button type="button" class="lang-btn" data-lang-btn="en" aria-pressed="false">EN</button>
      </div>
    </div>
  </header>

  <nav class="app-nav" data-i18n-aria-label="nav.aria">
    <a href="index.html" data-i18n="nav.today">Heute</a>
    <a href="horses.html" class="active" data-i18n="nav.horses">Pferde verwalten</a>
    <a href="horses-new.html" data-i18n="nav.add">Pferd hinzufügen</a>
  </nav>

  <main class="container">
    <div class="row-between" style="margin-bottom: 8px;">
      <h2 class="heading" data-i18n="horses.heading">Pferde verwalten</h2>
    </div>
    <p class="subheading" data-i18n="horses.subheading">Verwalte deine Pferde und ihre Eigenschaften.</p>

    <a href="horses-new.html" id="add-horse-link" class="btn-primary btn-block" style="margin-bottom: 20px;" data-i18n="horses.add">
      + Pferd hinzufügen
    </a>

    <div id="error-state" class="error" data-i18n="horses.error" hidden>
      Pferde konnten nicht geladen werden.
    </div>

    <section id="horses-list" data-i18n-aria-label="horses.list.aria">
      <template id="horse-card-template">
        <article class="card horse-card" data-horse-id="">
          <div class="row-between">
            <div>
              <h2 class="horse-name"></h2>
              <p class="meta horse-location"></p>
              <div class="horse-meta">
                <span class="tag tag-clipped" data-i18n="horses.tag.clipped" hidden>Geschoren</span>
                <span class="tag tag-sensitive" data-i18n="horses.tag.sensitive" hidden>Empfindlich</span>
                <span class="tag tag-risk"></span>
              </div>
            </div>
            <button type="button" class="btn-danger-soft delete-horse-btn" data-action="delete" data-i18n="horses.delete">
              Löschen
            </button>
          </div>
        </article>
      </template>
    </section>

    <section id="empty-state" class="empty" hidden>
      <h3 data-i18n="horses.empty.title">Noch keine Pferde angelegt</h3>
      <p data-i18n="horses.empty.body">Füge dein erstes Pferd hinzu, um loszulegen.</p>
      <a href="horses-new.html" class="btn-primary" data-i18n="horses.empty.cta">Pferd hinzufügen</a>
    </section>
  </main>

  <script src="lib/i18n.js"></script>
  <script src="lib/storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
